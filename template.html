<style>
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--tml-burgundy); color: var(--tml-cream);

  .toolbar a, .toolbar button {
    background: var(--tml-cream); color: var(--tml-burgundy);
    border: 0; padding: 6px 12px; border-radius: 3px;
    text-decoration: none; font-weight: 600; cursor: pointer; font-size: 12px;

  .toolbar a.ghost { background: transparent; color: var(--tml-cream); border: 1px solid var(--tml-cream); }

<body class="report">

<div class="toolbar no-print">
  <strong>TML Report Generator</strong>

  <span class="grow"></span>
  <a class="ghost" href="./index.html">Home</a>
  <a class="ghost" href="./blood.html">Blood</a>

</div>

<main id="report"></main>

<script src="./assets/auth.js?v=20260718d"></script>

<script src="./assets/sample-data.js?v=20260718d"></script>

  // Render the current full report shape (overview → history → movement → BCA →
  // blood → nutrition → mental → prescriptions → integrated) as the live reference.

    include: ['cover', 'blood', 'blood_rx', 'movement', 'movement_images', 'movement_rx',
              'bca', 'nutrition', 'nutrition_rx', 'wellbeing', 'wellbeing_rx', 'integrated'],
  });
</script>
