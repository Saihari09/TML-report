<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TML Report Generator — Login</title>
<link rel="stylesheet" href="./assets/report.css?v=20260629c" />
<link rel="stylesheet" href="./assets/app.css?v=20260629c" />
<style>
  body.app { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card {
    background: #fff; border: 1px solid var(--tml-line); border-top: 4px solid var(--tml-burgundy);
    border-radius: 6px; padding: 36px 32px; width: 100%; max-width: 380px;
    box-shadow: 0 8px 30px rgba(114,47,55,0.06);
  }
  .login-card .wm { color: var(--tml-burgundy); font-size: 18px; font-weight: 600; letter-spacing: 0.06em; }
  .login-card .wm small { display: block; color: var(--tml-gold); font-size: 10px; letter-spacing: 0.18em; margin-top: 2px; font-weight: 500; }
  .login-card h1 { font-size: 20px; color: var(--tml-burgundy); margin: 18px 0 6px; }
  .login-card .hint { color: var(--tml-muted); font-size: 13px; margin: 0 0 22px; }
  .login-card label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--tml-muted); display: block; margin: 14px 0 4px; }
  .login-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--tml-line); border-radius: 3px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
  .login-card .btn { width: 100%; margin-top: 22px; padding: 12px; font-size: 14px; }
  .err { color: var(--st-red); font-size: 12px; margin-top: 12px; min-height: 16px; }
</style>
</head>
<body class="app">
<form class="login-card" id="loginForm">
  <div class="wm">THE MOVEMENT LAB<small>Lifestyle, Realigned.</small></div>
  <h1>Sign in</h1>
  <p class="hint">TML Report Generator — clinician access only.</p>

  <label for="u">Username</label>
  <input id="u" name="username" autocomplete="username" autocapitalize="off" autocorrect="off" required />

  <label for="p">Password</label>
  <input id="p" name="password" type="password" autocomplete="current-password" required />

  <button class="btn" type="submit">Sign in</button>
  <div class="err" id="err"></div>
</form>

<script src="./assets/auth.js?v=20260629c"></script>
<script>
const form = document.getElementById('loginForm');
const err = document.getElementById('err');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  const u = document.getElementById('u').value;
  const p = document.getElementById('p').value;
  const res = await TML_AUTH.tryLogin(u, p);
  if (!res.ok) { err.textContent = res.error || 'Login failed'; return; }
  const back = new URLSearchParams(location.search).get('back');
  location.href = back ? decodeURIComponent(back) : './generator.html';
});

// If already logged in, bounce straight in.
if (TML_AUTH.getSession()) {
  const back = new URLSearchParams(location.search).get('back');
  location.replace(back ? decodeURIComponent(back) : './generator.html');
}
</script>
</body>
</html>
